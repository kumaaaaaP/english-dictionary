name: Generate Vocabulary HTML Files
# vocabulary_data*.json が変更されたときに実行
on:
  push:
    branches:
      - main
    paths:
      - 'vocabulary_data*.json'
  workflow_dispatch:  # 手動実行も可能

jobs:
  generate:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
      # 1. リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全履歴を取得（git diffのため）
      
      # 2. Pythonをセットアップ
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      # 3. dataフォルダを作成（存在しない場合）
      - name: Create data directory
        run: mkdir -p data
      
      # 4. 単語HTMLファイルを生成
      - name: Generate vocabulary HTML files
        run: |
          echo "🔧 Generating HTML files..."
          python generate_vocab.py
          echo ""
          echo "📁 Files in data/ directory (最初の20件):"
          ls -lh data/ | head -20
          echo ""
          echo "📊 Total HTML files:"
          ls -1 data/*.html 2>/dev/null | wc -l
          echo ""
          echo "✅ Vocabulary HTML files generated"
      
      # 5. index.htmlを更新（build_index.py を使用）
      - name: Update index.html
        run: |
          python build_index.py
          echo "✅ index.html updated"

      # 【追加】 5.5. exercise.htmlを更新（generate_exercise.py を使用）
      - name: Update exercise.html
        run: |
          python generate_exercise.py
          echo "✅ exercise.html updated"
      
      # 6. 変更があるかチェック
      - name: Check for changes
        id: check_changes
        run: |
          echo "📊 Git status:"
          git status
          echo ""
          
          # 新規ファイルと変更ファイルをチェック（exercise.html を監視対象に追加）
          if [ -n "$(git status --porcelain data/ index.html exercise.html)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "✅ Changes detected:"
            git status --porcelain data/ index.html exercise.html
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No changes detected"
          fi
      
      # 7. 生成されたファイルをコミット＆プッシュ
      - name: Commit and push changes
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "📦 Adding files to git..."
          # exercise.html を追加
          git add data/*.html index.html exercise.html
          
          echo "📋 Files to be committed:"
          git status --short
          
          echo "💾 Committing changes..."
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "🤖 Auto-generate vocabulary HTML files, update index and exercise [skip ci]"
          
          echo "🚀 Pushing changes..."
          git push
          
          echo "✅ Changes pushed successfully"
      
      # 8. 完了サマリー
      - name: Job summary
        run: |
          echo "## 📊 Generation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### JSON Files Processed" >> $GITHUB_STEP_SUMMARY
          for file in vocabulary_data*.json; do
            if [ -f "$file" ]; then
              count=$(python3 -c "import json; print(len(json.load(open('$file'))['words']))" 2>/dev/null || echo "0")
              echo "- \`$file\`: $count words" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Generated Files" >> $GITHUB_STEP_SUMMARY
          total=$(ls -1 data/*.html 2>/dev/null | wc -l)
          echo "- Total: **$total HTML files** in \`data/\` directory" >> $GITHUB_STEP_SUMMARY
          echo "- **exercise.html** generated/updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ \`index.html\` and \`exercise.html\` updated" >> $GITHUB_STEP_SUMMARY
